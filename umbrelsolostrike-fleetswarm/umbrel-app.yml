id: umbrelsolostrike-fleetswarm
category: bitcoin
name: FleetSwarm
version: "0.2.2"
tagline: Health dashboard for mixed Bitcoin ASIC fleets
description: >-
  FleetSwarm is a self-hosted health dashboard for mixed Bitcoin SHA-256 ASIC
  fleets. One pane of glass for Bitaxe, BitForge, Avalon Q, and Nerd Miner
  devices — no matter which firmware they run.


  ✦ Speaks three protocols natively: AxeOS REST (Bitaxe / BitForge / Nerd
  Miner), CGMiner TCP on port 4028 (Avalon Q and other CGMiner-compatible
  ASICs), and Public Pool / SoloStrike HTTP API for pool-side cross-reference.


  ✦ Auto-discovers your LAN — every poll cycle sweeps a /24 subnet for new
  miners. Plug a new BitForge in, it shows up in 30 seconds.


  ✦ Fleet health roll-up at a glance. The header pill flips green / orange /
  red based on configurable thresholds for temperature, reject rate, and
  offline duration.


  ✦ Per-miner hashrate, temperature, fan speed, accepted/rejected shares,
  power draw, and best difficulty. Color-coded by class (BitForge, Bitaxe,
  Avalon, Nerd) so the four tiers are instantly distinguishable.


  ✦ 14-day rolling history in SQLite. Time-series API endpoint exposed
  for future charting and alerting integrations.


  ✦ Industrial terminal aesthetic — dense, glanceable, no decorative cruft.
  Built to be the always-on monitor on your desk or wall.


  ✦ Universal — no utility-specific assumptions baked in. Works the same
  whether you're in Arizona, Texas, Vienna, or anywhere else.

releaseNotes: >-
  ✦ Avalon Q best-share tracking — Avalons running CGMiner now expose their
  session-best difficulty in the dashboard, just like AxeOS-style miners.
  Reads "Best Share" from the CGMiner summary command.


  ✦ AxeBCH2 integration finally works — replaced the legacy Public-Pool-style
  fetcher with a new one that hits AxeBCH2's actual /api/pool/workers
  endpoint. Pool 2 now populates with real worker data, including hashrate
  (auto-converted to TH/s when ≥ 1000 GH/s) and best-ever difficulty.


  ✦ Card layout: status side-column — the dead space next to each miner's
  hashrate now shows uptime and pool host. Cards are slightly more compact
  too, so more miners fit on screen.


  ✦ Reject row now shows count + percent — e.g. "REJ 4 · 0.12%" instead of
  just the raw count, with color escalating from white → orange → red as
  the percent crosses your per-class threshold.


  ✦ Dashboard favicon — the bright orange hex icon now appears in browser
  tabs and bookmarks.


  ✦ Footer attribution — built by Gil Bechtel · SoloStrike.io. Click the
  name to jump to the GitHub repo.
