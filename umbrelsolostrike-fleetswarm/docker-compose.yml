version: "3.7"

services:
  # ────────────────────────────────────────────────────────────────────────
  # Umbrel app proxy — handles authentication and routing to the app
  # ────────────────────────────────────────────────────────────────────────
  app_proxy:
    environment:
      APP_HOST: umbrelsolostrike-fleetswarm_web_1
      APP_PORT: 8888

  # ────────────────────────────────────────────────────────────────────────
  # FleetSwarm web UI + poller (single container, polls every 30s)
  # ────────────────────────────────────────────────────────────────────────
  web:
    # IMPORTANT: when publishing to the store, replace `:latest` with a
    # version tag pinned by sha256 digest, e.g.:
    #   image: ghcr.io/gbechtel-beck/fleetswarm:0.2.1@sha256:<digest>
    image: ghcr.io/gbechtel-beck/fleetswarm:0.2.1@sha256:20de1f9bf850a5e26d165fbd9d6cc94107911cf8836198f8d555e5ecc4bed4f3
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      # Default poll interval in seconds — overridable via Settings UI
      POLL_INTERVAL: "30"
      # Default subnet to auto-scan (configurable in app)
      DEFAULT_SUBNET: "192.168.1.0/24"
