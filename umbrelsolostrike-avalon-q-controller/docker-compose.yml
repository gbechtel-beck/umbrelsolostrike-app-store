version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: umbrelsolostrike-avalon-q-controller_web_1
      APP_PORT: 8000

  web:
    image: ghcr.io/gbechtel-beck/avalon-q-controller:2.0.4
    restart: on-failure
    stop_grace_period: 1m
    environment:
      APP_DATA_DIR: /data
      LOG_LEVEL: INFO
    volumes:
      - ${APP_DATA_DIR}/data:/data
