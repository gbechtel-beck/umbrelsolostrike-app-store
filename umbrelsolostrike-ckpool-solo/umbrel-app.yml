releaseNotes: >-
  v1.0.1 — Two stability fixes. (1) Pool hashrate chart was recording 0 for
  every sample because the pool.status NDJSON file (multi-line JSON) was
  parsed as a single JSON object and silently failed. The chart now correctly
  records and displays real-time pool hashrate. (2) Dashboard appeared frozen
  unless manually refreshed because Promise.all on four data sources rejected
  whenever one (coincap.io) was blocked by Umbrel network isolation, killing
  the auto-refresh cycle. Now uses Promise.allSettled so individual failed
  sources don't break the others, plus a defense-in-depth wrapper around
  the setInterval bootstrap. Both Pool Hashrate chart and Hashrate Stability
  chart will populate over the next 24 hours of new samples.
