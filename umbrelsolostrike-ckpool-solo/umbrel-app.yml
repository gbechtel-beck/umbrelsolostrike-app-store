releaseNotes: >-
  v1.0.2 — Worker panel auto-refresh. Previously the per-worker cards,
  COMBINED HASHRATE, and AVG LAST SHARE only updated when you pressed Load
  Workers. The whole dashboard now ticks every 60 seconds: pool stats,
  worker panel, charts, and last-share timers all refresh together on the
  same cadence with proper error isolation between sources.
