manifestVersion: 1
id: umbrelsolostrike-ckpool-solo
category: bitcoin
name: CKPool Solo
version: "1.0.2"
tagline: Host your own solo Bitcoin mining pool — keep the full block reward
icon: https://raw.githubusercontent.com/gbechtel-beck/umbrelsolostrike-app-store/main/umbrelsolostrike-ckpool-solo/icon.jpg
description: >-
  CKPool Solo turns your Umbrel into a sovereign Bitcoin mining pool. Install it,
  point your miners at it, and any block your hardware solves pays the full
  3.125 BTC reward directly to your address — no pool fees, no withholding, no
  middleman. Your block templates are built locally from your own Bitcoin node,
  validated against your own chain, and broadcast directly to the network.


  Designed for home miners running Bitaxe, NerdQaxe, BitForge, Antminer, Avalon,
  or any SHA-256 ASIC that speaks stratum. The bundled web dashboard shows live
  pool hashrate, per-worker health (last share, drift vs expected interval,
  best difficulty per session), block history, network odds, and a 24-hour
  hashrate chart. Fixed difficulty 4096 keeps share submissions frequent so
  small Bitaxe-class miners can see real activity from minute one.


  Solo mining is a lottery — you may never solve a block. But when you do, it
  goes from your node straight to the network with zero intermediaries. Recent
  proof: in October 2025 a 130 TH/s home setup found Bitcoin block 920,440 and
  collected 3.15 BTC (~$342,000) using this exact stack. In November 2025 a
  6-Bitaxe cluster (combined 6.6 TH/s, hardware under $800) found block 924,569.
  The next solver could be running on your shelf.


  Powered by CKPool by Con Kolivas (GPLv3) — the same software behind
  solo.ckpool.org, which has found over 313 solo blocks since 2014. Forked,
  packaged, and maintained for Umbrel by Gil Bechtel at SoloStrike.io.
developer: Gil Bechtel — SoloStrike.io
website: https://solostrike.io
dependencies:
  - bitcoin
