manifestVersion: 1
id: umbrelsolostrike-ckpool-solo
category: bitcoin
name: CKPool Solo
version: "1.0.0"
tagline: Self-sovereign Bitcoin solo mining powered by CKPool
icon: https://raw.githubusercontent.com/gbechtel-beck/umbrelsolostrike-app-store/main/umbrelsolostrike-ckpool-solo/icon.jpg
description: >-
  Run your own solo Bitcoin mining pool on your Umbrel node, powered by CKPool
  — the same battle-tested software behind solo.ckpool.org, written by Con Kolivas.
  Forked and packaged for Umbrel by Gil Bechtel at SoloStrike.io. Connect your
  ASICs, BitAxe, or Nerd Miners directly to your own Bitcoin node. No third-party
  pool, no fees, no KYC — just you and the Bitcoin network.


  Features a live dashboard with real-time hashrate history, network difficulty
  from your Bitcoin node, difficulty retarget countdown, pool network odds,
  per-worker stats, and a built-in explanation of how solo mining shares and
  luck work.
developer: Gil Bechtel — SoloStrike.io
website: https://solostrike.io
dependencies:
  - bitcoin
repo: https://github.com/gbechtel-beck/umbrelsolostrike-app-store
support: https://github.com/gbechtel-beck/umbrelsolostrike-app-store/issues
port: 4040
path: ""
defaultPassword: ""
gallery:
  - https://raw.githubusercontent.com/gbechtel-beck/umbrelsolostrike-app-store/main/umbrelsolostrike-ckpool-solo/1.png
releaseNotes: >-
  Initial release of CKPool Solo for Umbrel by Gil Bechtel, SoloStrike.io.
widgets:
  - id: "stats"
    type: "four-stats"
    refresh: "30s"
    endpoint: "widget:3001/widget"
    link: ""
    example:
      type: "four-stats"
      link: ""
      items:
        - title: "Pool HR"
          text: "108"
          subtext: "TH/s"
        - title: "Workers"
          text: "9"
        - title: "Blocks Found"
          text: "0"
        - title: "Best Share"
          text: "592.455M"
