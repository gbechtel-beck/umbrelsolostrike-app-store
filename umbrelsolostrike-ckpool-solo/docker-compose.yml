version: "3.7"
services:
  app_proxy:
    environment:
      APP_HOST: umbrelsolostrike-ckpool-solo_web_1
      APP_PORT: 4040
      PROXY_AUTH_ADD: "false"

  ckpool:
    image: ghcr.io/gbechtel-beck/ckpool-solo-ckpool:latest
    entrypoint: ["/bin/bash", "-c", "rm -rf /ckpool/logs/ckpool.sock && /entrypoint.sh"]
    container_name: umbrelsolostrike-ckpool-solo_ckpool_1
    restart: on-failure
    environment:
      BITCOIN_RPC_URL: "http://$APP_BITCOIN_NODE_IP"
      BITCOIN_RPC_PORT: "$APP_BITCOIN_RPC_PORT"
      BITCOIN_RPC_USER: "$APP_BITCOIN_RPC_USER"
      BITCOIN_RPC_PASS: "$APP_BITCOIN_RPC_PASS"
      STRATUM_PORT: "3334"
      POOL_SIG: "/SoloStrike.io/"
      POOL_FEE: "0"
      MIN_DIFF: "65536"
      START_DIFF: "65536"
      MAX_DIFF: "0"
    volumes:
      - "${APP_DATA_DIR}/logs:/ckpool/logs"
    ports:
      - "3334:3334/tcp"

  web:
    image: ghcr.io/gbechtel-beck/ckpool-solo-ui:latest
    container_name: umbrelsolostrike-ckpool-solo_web_1
    restart: on-failure
    environment:
      CKPOOL_LOG_DIR: "/ckpool/logs"
      PORT: "4040"
      BITCOIN_RPC_URL: "http://$APP_BITCOIN_NODE_IP"
      BITCOIN_RPC_PORT: "$APP_BITCOIN_RPC_PORT"
      BITCOIN_RPC_USER: "$APP_BITCOIN_RPC_USER"
      BITCOIN_RPC_PASS: "$APP_BITCOIN_RPC_PASS"
    volumes:
      - "${APP_DATA_DIR}/logs:/ckpool/logs:ro"
    depends_on:
      - ckpool

  widget:
    image: node:18-alpine
    container_name: umbrelsolostrike-ckpool-solo_widget_1
    restart: on-failure
    command: ["sh", "-c", "node -e \"const http=require('http'),fs=require('fs');http.createServer((req,res)=>{if(req.url!=='/widget'){res.writeHead(404);res.end();return;}try{const lines=fs.readFileSync('/ckpool/logs/pool/pool.status','utf8').trim().split('\\n');const runtime=JSON.parse(lines[0]);const hashrate=JSON.parse(lines[1]);const diff=JSON.parse(lines[2]);const hr=hashrate.hashrate1m||'--';const workers=runtime.Workers||0;const best=diff.bestshare||0;const bestFmt=best>=1e9?(best/1e9).toFixed(3)+'B':best>=1e6?(best/1e6).toFixed(3)+'M':best>=1e3?(best/1e3).toFixed(1)+'K':String(best);const data={type:'four-stats',link:'',items:[{title:'Pool HR',text:hr.replace(/[A-Za-z]+$/,''),subtext:hr.replace(/^[0-9.]+/,'')},{title:'Workers',text:String(workers)},{title:'Blocks Found',text:'0'},{title:'Best Share',text:bestFmt}]};res.writeHead(200,{'Content-Type':'application/json'});res.end(JSON.stringify(data));}catch(e){res.writeHead(500);res.end(JSON.stringify({error:e.message}));}}).listen(3001,()=>console.log('Widget on 3001'));\""]
    volumes:
      - "${APP_DATA_DIR}/logs:/ckpool/logs:ro"
    depends_on:
      - ckpool
